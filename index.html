<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Golden Beans - Experience the finest artisan coffee, ethically sourced and roasted to perfection.">
    <title>Golden Beans | Artisan Coffee</title>

    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Golden Beans</h1>
            <p class="hero-description">Experience the finest artisan coffee, ethically sourced and roasted to
                perfection. Awaken your senses with every cup.</p>
            <a href="#menu" class="btn" id="view-menu-btn">View Menu</a>
        </div>
    </main>

    <!-- Menu Section -->
    <section class="menu" id="menu">
        <h2>Our Menu</h2>
        <div class="menu-grid">
            <div class="menu-item">
                <img src="images/espresso.png" alt="Espresso" class="menu-item-img">
                <div class="menu-item-details">
                    <span class="menu-item-name">Espresso</span>
                    <span class="menu-item-price">$3.00</span>
                </div>
            </div>
            <div class="menu-item">
                <img src="images/latte.png" alt="Latte" class="menu-item-img">
                <div class="menu-item-details">
                    <span class="menu-item-name">Latte</span>
                    <span class="menu-item-price">$4.50</span>
                </div>
            </div>
            <div class="menu-item">
                <img src="images/cappuccino.png" alt="Cappuccino" class="menu-item-img">
                <div class="menu-item-details">
                    <span class="menu-item-name">Cappuccino</span>
                    <span class="menu-item-price">$4.50</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact" id="contact">
        <div class="contact-content">
            <h2>Contact Us</h2>
            <div class="contact-info">
                <p><strong>Phone:</strong> +959 1234567</p>
                <p><strong>Email:</strong> <a href="mailto:hello@goldenbeans.com">hello@goldenbeans.com</a></p>
            </div>
        </div>
    </section>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>

</html>
